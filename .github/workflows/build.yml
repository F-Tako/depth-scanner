name: Build Depth Scanner

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies (CPU only)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers accelerate opencv-python-headless Pillow tqdm tkinterdnd2
          pip install pyinstaller

      - name: Build GUI exe
        run: |
          pyinstaller --onefile --name depth-scanner --console --noconfirm depth_scanner_gui.py

      - name: Build CLI exe
        run: |
          pyinstaller --onefile --name depth-scanner-cli --console --noconfirm depth_scanner.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: depth-scanner-windows
          path: |
            dist/depth-scanner.exe
            dist/depth-scanner-cli.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/depth-scanner.exe
            dist/depth-scanner-cli.exe
          body: |
            ## Depth Scanner ${{ github.ref_name }}
            
            ### Download
            - depth-scanner.exe - GUI (drag and drop)
            - depth-scanner-cli.exe - CLI (terminal)
            
            ### Note
            - First run downloads Marigold model (~2GB)
            - CPU version (GPU needs Python install)
            - Supports 8K+ resolution
            - EXR 32bit / PNG 16bit / PNG 8bit output
