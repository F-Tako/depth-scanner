name: Build Depth Scanner

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-cpu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install CPU deps
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers accelerate opencv-python-headless Pillow tqdm tkinterdnd2
          pip install pyinstaller
      - name: Build GUI exe (CPU)
        run: pyinstaller --onefile --name depth-scanner-cpu --console --noconfirm depth_scanner_gui.py
      - name: Build CLI exe (CPU)
        run: pyinstaller --onefile --name depth-scanner-cli-cpu --console --noconfirm depth_scanner.py
      - uses: actions/upload-artifact@v4
        with:
          name: depth-scanner-cpu
          path: |
            dist/depth-scanner-cpu.exe
            dist/depth-scanner-cli-cpu.exe

  build-gpu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install GPU deps (CUDA 12.1)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cu121
          pip install diffusers transformers accelerate opencv-python-headless Pillow tqdm tkinterdnd2
          pip install pyinstaller
      - name: Build GUI exe (GPU)
        run: pyinstaller --onefile --name depth-scanner-gpu --console --noconfirm depth_scanner_gui.py
      - name: Build CLI exe (GPU)
        run: pyinstaller --onefile --name depth-scanner-cli-gpu --console --noconfirm depth_scanner.py
      - uses: actions/upload-artifact@v4
        with:
          name: depth-scanner-gpu
          path: |
            dist/depth-scanner-gpu.exe
            dist/depth-scanner-cli-gpu.exe

  release:
    needs: [build-cpu, build-gpu]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            depth-scanner-cpu/depth-scanner-cpu.exe
            depth-scanner-cpu/depth-scanner-cli-cpu.exe
            depth-scanner-gpu/depth-scanner-gpu.exe
            depth-scanner-gpu/depth-scanner-cli-gpu.exe
          body: |
            ## Depth Scanner ${{ github.ref_name }}
            
            ### GPU (NVIDIA CUDA) - recommended
            - depth-scanner-gpu.exe (GUI)
            - depth-scanner-cli-gpu.exe (CLI)
            
            ### CPU (no GPU needed)
            - depth-scanner-cpu.exe (GUI)
            - depth-scanner-cli-cpu.exe (CLI)
